name: Sync Policy Tracker Data

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch:         # allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch tracker data from Tech Policy Press
        run: |
          curl -sSf \
            "https://3tzzh18d.api.sanity.io/v2023-05-03/data/query/production?query=$(python3 -c "import urllib.parse; print(urllib.parse.quote('*[_type == \"policy_action\" && !(_id in path(\"drafts.**\"))]{category, country, dateInitiated, lastUpdate, _id, slug, status, title, relatedTopics[]->{_id, name, slug, displayName}, type}|order(lastUpdate desc)'))")" \
            -o tracker-data.json
          echo "Fetched $(cat tracker-data.json | python3 -c "import sys,json; print(len(json.load(sys.stdin).get('result', [])))"  ) tracker items"

      - name: Commit updated data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tracker-data.json
          if git diff --staged --quiet; then
            echo "No changes to tracker data"
          else
            git commit -m "chore: sync tracker data [skip ci]"
            git push
          fi
