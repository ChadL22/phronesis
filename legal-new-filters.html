<!-- NEW FILTER DESIGN FOR LEGAL ANALYSES -->
<style>
/* ── UNIFIED FILTER SYSTEM ── */
.legal-controls-new {
  background: var(--paper);
  border-bottom: 1px solid var(--rule);
}

/* Primary filter row - always visible */
.legal-primary-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.75rem clamp(1.5rem, 5vw, 5rem);
  border-bottom: 1px solid var(--rule);
  gap: 1rem;
}

.legal-primary-filters {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  flex-wrap: wrap;
}

.legal-filter-label-new {
  font-size: 0.6rem;
  letter-spacing: 0.13em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-right: 0.25rem;
}

.legal-filter-btn-new {
  font-family: var(--sans);
  font-size: 0.6rem;
  font-weight: 400;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-3);
  background: none;
  border: 1px solid transparent;
  border-radius: 2px;
  padding: 0.2rem 0.55rem;
  cursor: pointer;
  transition: all 0.18s;
}

.legal-filter-btn-new:hover {
  color: var(--ink);
  border-color: var(--rule);
}

.legal-filter-btn-new.active {
  color: var(--accent);
  border-color: var(--accent);
}

/* More Filters toggle button */
.legal-more-filters-btn {
  font-family: var(--sans);
  font-size: 0.62rem;
  font-weight: 400;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-3);
  background: none;
  border: 1px solid var(--rule);
  border-radius: 2px;
  padding: 0.28rem 0.7rem;
  cursor: pointer;
  transition: all 0.18s;
  display: flex;
  align-items: center;
  gap: 0.4rem;
}

.legal-more-filters-btn:hover {
  color: var(--ink);
  border-color: var(--accent);
}

.legal-more-filters-btn.active {
  color: var(--accent);
  border-color: var(--accent);
  background: var(--paper-2);
}

.legal-more-filters-btn svg {
  width: 9px;
  height: 9px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  transition: transform 0.18s;
}

.legal-more-filters-btn.active svg {
  transform: rotate(180deg);
}

/* View toggle on the right */
.legal-view-toggle-new {
  display: flex;
  border: 1px solid var(--rule);
  border-radius: 2px;
  overflow: hidden;
  flex-shrink: 0;
}

.legal-view-btn-new {
  font-family: var(--sans);
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  background: none;
  border: none;
  padding: 0.28rem 0.7rem;
  cursor: pointer;
  color: var(--ink-3);
  transition: all 0.18s;
  display: flex;
  align-items: center;
  gap: 0.35rem;
}

.legal-view-btn-new + .legal-view-btn-new {
  border-left: 1px solid var(--rule);
}

.legal-view-btn-new.active {
  background: var(--accent);
  color: #EEE8DA;
}

.legal-view-btn-new svg {
  width: 11px;
  height: 11px;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.6;
}

/* Secondary filters - collapsible */
.legal-secondary-filters {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease-out;
  background: var(--paper-2);
}

.legal-secondary-filters.open {
  max-height: 500px;
}

.legal-secondary-inner {
  padding: 0.85rem clamp(1.5rem, 5vw, 5rem);
  display: flex;
  flex-direction: column;
  gap: 0.85rem;
}

.legal-filter-group-new {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  flex-wrap: wrap;
}

/* Mobile responsive */
@media (max-width: 900px) {
  .legal-primary-row {
    flex-direction: column;
    align-items: stretch;
    gap: 0.75rem;
  }

  .legal-primary-filters {
    order: 1;
    flex-direction: column;
    align-items: stretch;
  }

  .legal-filter-group-new {
    flex-direction: column;
    align-items: stretch;
  }

  .legal-filter-label-new {
    margin-bottom: 0.25rem;
  }

  .legal-filter-group-new > div {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }

  .legal-more-filters-btn {
    order: 2;
  }

  .legal-view-toggle-new {
    order: 3;
    width: 100%;
  }

  .legal-view-btn-new {
    flex: 1;
    justify-content: center;
    padding: 0.5rem;
  }

  .legal-secondary-inner {
    gap: 0.75rem;
  }
}
</style>

<!-- HTML STRUCTURE -->
<div class="legal-controls-new">
  <!-- Primary row: TYPE + More Filters + View Toggle -->
  <div class="legal-primary-row">
    <div class="legal-primary-filters">
      <span class="legal-filter-label-new">Type</span>
      <button class="legal-filter-btn-new active" data-filter="type" data-value="all">All</button>
      <button class="legal-filter-btn-new" data-filter="type" data-value="doctrinal">Doctrinal</button>
      <button class="legal-filter-btn-new" data-filter="type" data-value="case">Case</button>
      <button class="legal-filter-btn-new" data-filter="type" data-value="statutory">Statutory</button>
      <button class="legal-filter-btn-new" data-filter="type" data-value="regulatory">Regulatory</button>
    </div>

    <button class="legal-more-filters-btn" id="legal-more-filters-toggle">
      <svg viewBox="0 0 24 24">
        <polyline points="6 9 12 15 18 9"></polyline>
      </svg>
      More Filters
    </button>

    <div class="legal-view-toggle-new">
      <button class="legal-view-btn-new active" id="legal-btn-list-new">
        <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        List
      </button>
      <button class="legal-view-btn-new" id="legal-btn-cards-new">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Cards
      </button>
    </div>
  </div>

  <!-- Secondary filters - collapsible -->
  <div class="legal-secondary-filters" id="legal-secondary-filters">
    <div class="legal-secondary-inner">
      <!-- Topic filter -->
      <div class="legal-filter-group-new">
        <span class="legal-filter-label-new">Topic</span>
        <button class="legal-filter-btn-new active" data-filter="topic" data-value="all">All</button>
        <button class="legal-filter-btn-new" data-filter="topic" data-value="first-amendment">First Amendment</button>
        <button class="legal-filter-btn-new" data-filter="topic" data-value="antitrust">Antitrust</button>
        <button class="legal-filter-btn-new" data-filter="topic" data-value="liability">Liability</button>
        <button class="legal-filter-btn-new" data-filter="topic" data-value="administrative">Administrative</button>
        <button class="legal-filter-btn-new" data-filter="topic" data-value="ip">IP</button>
      </div>

      <!-- Origin filter -->
      <div class="legal-filter-group-new">
        <span class="legal-filter-label-new">Origin</span>
        <button class="legal-filter-btn-new active" data-filter="origin" data-value="all">All</button>
        <button class="legal-filter-btn-new" data-filter="origin" data-value="original">Original</button>
        <button class="legal-filter-btn-new" data-filter="origin" data-value="via">Via</button>
      </div>
    </div>
  </div>
</div>

<script>
// More Filters toggle
document.getElementById('legal-more-filters-toggle').addEventListener('click', function() {
  this.classList.toggle('active');
  document.getElementById('legal-secondary-filters').classList.toggle('open');
});

// Filter button handlers
document.querySelectorAll('.legal-filter-btn-new').forEach(btn => {
  btn.addEventListener('click', function() {
    const filter = this.dataset.filter;
    // Remove active from siblings
    document.querySelectorAll(`[data-filter="${filter}"]`).forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    // Apply filter logic here
  });
});

// View toggle
document.getElementById('legal-btn-list-new').addEventListener('click', function() {
  this.classList.add('active');
  document.getElementById('legal-btn-cards-new').classList.remove('active');
  // Show list view
});

document.getElementById('legal-btn-cards-new').addEventListener('click', function() {
  this.classList.add('active');
  document.getElementById('legal-btn-list-new').classList.remove('active');
  // Show card view
});
</script>
